name: Sync Grist → MySQL

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Éclater les publics dans Grist
        env:
          GRIST_API_KEY: ${{ secrets.GRIST_API_KEY }}
          GRIST_SERVER: ${{ secrets.GRIST_SERVER }}
          GRIST_DOC_1_ID: ${{ secrets.GRIST_DOC_1_ID }}
        run: python sync_publics.py

      - name: Lancer la sync Grist → MySQL
        env:
          GRIST_API_KEY: ${{ secrets.GRIST_API_KEY }}
          GRIST_SERVER: ${{ secrets.GRIST_SERVER }}
          GRIST_DOC_1_ID: ${{ secrets.GRIST_DOC_1_ID }}
          GRIST_DOC_1_TABLES: ${{ secrets.GRIST_DOC_1_TABLES }}
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
        run: python sync.py
